<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSensei — Explore</title>
<style>
  :root{
    --bg:#eef1fb;
    --header-bg-1:#8fa8d3;
    --header-bg-2:#a9b8d9;
    --navy:#1b2340;
    --muted:#6b7488;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--navy);
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:28px;
    padding:14px clamp(20px, 5vw, 72px);
    background:linear-gradient(90deg, var(--header-bg-1), var(--header-bg-2));
    position:sticky;
    top:0;
    z-index:10;
  }

  .logo{
    display:inline-flex;
    align-items:center;
    text-decoration:none;
    flex-shrink:0;
  }

  .brand-logo{
    display:block;
    width:clamp(230px, 28vw, 360px);
    max-height:86px;
    object-fit:contain;
  }

  nav{
    display:flex;
    gap:clamp(18px, 3vw, 42px);
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  nav a{
    text-decoration:none;
    color:var(--navy);
    font-size:17px;
    font-weight:500;
  }

  nav a.active{ font-weight:800; }
  nav a:hover{ opacity:0.75; }

  main{
    width:min(900px, calc(100% - 40px));
    margin:0 auto;
    padding:72px 0;
  }

  h1{
    margin:0 0 12px;
    font-size:44px;
  }

  p{
    margin:0;
    color:var(--muted);
    font-size:18px;
    line-height:1.5;
  }

  @media (max-width: 700px){
    header{
      align-items:flex-start;
      flex-direction:column;
      gap:14px;
      padding:14px 20px;
    }

    nav{
      gap:12px 18px;
      justify-content:flex-start;
    }

    nav a{ font-size:15px; }

    .brand-logo{ width:min(100%, 320px); }
  }
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html" aria-label="StockSensei home">
    <img class="brand-logo" src="assets/stocksensei-logo.png" alt="StockSensei">
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="Predict.html">Predict</a>
    <a href="learn.html">Learn</a>
    <a href="watchlist.html">Watchlist</a>
    <a href="explore.html" class="active">Explore</a>
    <a href="About.html">About Us</a>
  </nav>
</header>

<main>
  <h1>Explore</h1>
  <p>Market discovery tools can go here.</p>
</main>
</body>
</html>
